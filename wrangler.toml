name = "reetzfam-org"
main = "worker/index.ts"
compatibility_date = "2026-06-23"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*"]

# Store production values in Cloudflare Pages settings or with `wrangler secret put`.
